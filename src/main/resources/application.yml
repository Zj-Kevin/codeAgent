spring:
  main:
    web-application-type: none
    banner-mode: off
  threads:
    virtual:
      enabled: true

logging:
  level:
    root: ERROR

mewcode:
  provider:
    protocol: deepseek
    model: deepseek-v4-pro
    base-url: https://api.deepseek.com
    api-key: ${DEEPSEEK_API_KEY}
  agent:
    max-rounds: 25
    include-tools: true
  http:
    timeout-seconds: 120
  history:
    dir: ~/.mewcode/history
